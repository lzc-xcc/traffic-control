<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线路站点 | 郑州地铁8号线</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">8</span>
                <span>郑州地铁8号线</span>
            </a>
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">首页</a>
                <a href="route.html" class="nav-link active">线路站点</a>
                <a href="operation.html" class="nav-link">运营分析</a>
                <a href="transfer.html" class="nav-link">换乘枢纽</a>
                <a href="map.html" class="nav-link">线路地图</a>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title">全线站点明细</h1>
            <p class="page-subtitle">天健湖站 → 鲁庙站（下行方向）共28座地下车站</p>
        </div>
    </header>

    <!-- 站点列表 -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">下行方向（天健湖 → 鲁庙）</h2>
            
            <div class="card mb-8">
                <div class="card-body">
                    <div class="station-list" id="downStations">
                        <!-- 站点将通过JavaScript动态渲染 -->
                    </div>
                </div>
            </div>

            <h2 class="section-title" style="margin-top: 60px;">上行方向（鲁庙 → 天健湖）</h2>
            
            <div class="card">
                <div class="card-body">
                    <div class="station-list" id="upStations">
                        <!-- 站点将通过JavaScript动态渲染 -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 图例说明 -->
    <section class="section" style="background: var(--primary-light);">
        <div class="container">
            <h2 class="section-title">图例说明</h2>
            <div class="grid-3">
                <div class="card">
                    <div class="card-body" style="display: flex; align-items: center; gap: 16px;">
                        <span class="station-number">1</span>
                        <div>
                            <strong>普通站点</strong>
                            <p class="text-secondary" style="font-size: 0.875rem;">中间站/起点站/终点站</p>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body" style="display: flex; align-items: center; gap: 16px;">
                        <span class="station-number transfer">4</span>
                        <div>
                            <strong>换乘站点</strong>
                            <p class="text-secondary" style="font-size: 0.875rem;">可换乘其他线路</p>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body" style="display: flex; align-items: center; gap: 16px;">
                        <span class="transfer-line">1号线</span>
                        <div>
                            <strong>换乘线路标签</strong>
                            <p class="text-secondary" style="font-size: 0.875rem;">显示可换乘的线路</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 站点统计 -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">站点统计</h2>
            <div class="grid-4">
                <div class="stat-card">
                    <div class="stat-value">1座</div>
                    <div class="stat-label">起点站</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">1座</div>
                    <div class="stat-label">终点站</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">9座</div>
                    <div class="stat-label">换乘站</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">17座</div>
                    <div class="stat-label">中间站</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>城市公共交通课程报告 - 郑州地铁8号线一期调研</p>
            <p style="font-size: 0.875rem; opacity: 0.6;">数据来源：郑州地铁官方公告</p>
            <p style="font-size: 0.875rem; opacity: 0.8; margin-top: 16px;">© 2026 李政聪 版权所有</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // 站点数据
        const stations = [
            { id: 1, name: "天健湖", transfer: null, type: "起点站" },
            { id: 2, name: "轻工业大学", transfer: null, type: "中间站" },
            { id: 3, name: "祥营", transfer: null, type: "中间站" },
            { id: 4, name: "郑州大学", transfer: ["1号线"], type: "换乘站" },
            { id: 5, name: "银屏路", transfer: null, type: "中间站" },
            { id: 6, name: "冬青街", transfer: null, type: "中间站" },
            { id: 7, name: "南流", transfer: null, type: "中间站" },
            { id: 8, name: "大学科技园", transfer: null, type: "中间站" },
            { id: 9, name: "五龙口", transfer: null, type: "中间站" },
            { id: 10, name: "同乐", transfer: ["3号线"], type: "换乘站" },
            { id: 11, name: "省中医院", transfer: null, type: "中间站" },
            { id: 12, name: "白庙", transfer: ["7号线"], type: "换乘站" },
            { id: 13, name: "东风路", transfer: ["2号线"], type: "换乘站" },
            { id: 14, name: "枣庄", transfer: null, type: "中间站" },
            { id: 15, name: "小营", transfer: ["6号线"], type: "换乘站" },
            { id: 16, name: "龙湖中环南", transfer: ["4号线"], type: "换乘站" },
            { id: 17, name: "郑大一附院东区", transfer: null, type: "中间站" },
            { id: 18, name: "高铁公园", transfer: ["12号线"], type: "换乘站" },
            { id: 19, name: "畅和街", transfer: null, type: "中间站" },
            { id: 20, name: "郑州东站", transfer: ["1号线", "5号线"], type: "换乘站" },
            { id: 21, name: "圃田西", transfer: ["3号线"], type: "换乘站" },
            { id: 22, name: "圃田", transfer: null, type: "中间站" },
            { id: 23, name: "省社科院", transfer: null, type: "中间站" },
            { id: 24, name: "福泽路", transfer: null, type: "中间站" },
            { id: 25, name: "李湖桥", transfer: null, type: "中间站" },
            { id: 26, name: "龙王庙", transfer: null, type: "中间站" },
            { id: 27, name: "绿博园", transfer: null, type: "中间站" },
            { id: 28, name: "鲁庙", transfer: null, type: "终点站" }
        ];

        // 渲染站点列表
        function renderStations(stationList, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = stations.map(station => {
                const isTransfer = station.transfer !== null;
                const isTerminal = station.type === "起点站" || station.type === "终点站";
                const typeClass = isTransfer ? "transfer" : (isTerminal ? "terminal" : "");
                
                return `
                    <div class="station-item">
                        <span class="station-number ${isTransfer ? 'transfer' : ''}">${station.id}</span>
                        <div class="station-info">
                            <div class="station-name">${station.name}</div>
                            <div class="station-meta">
                                <span class="station-type ${typeClass}">${station.type}</span>
                                ${isTransfer ? `
                                    <div class="transfer-lines">
                                        ${station.transfer.map(line => `<span class="transfer-line">${line}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 页面加载时渲染站点
        document.addEventListener('DOMContentLoaded', function() {
            renderStations(stations, 'downStations');
            // 上行方向反转站点顺序但编号连续
            const upStations = [...stations].reverse().map((s, i) => ({...s, id: i + 1}));
            renderStations(upStations, 'upStations');
        });
    </script>
</body>
</html>
